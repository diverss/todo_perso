<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Accès — Todo</title>
  {% load static %}
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='18' fill='%23db4035'/><text x='50' y='78' font-size='68' text-anchor='middle' fill='white' font-family='sans-serif'>✓</text></svg>">
  <link rel="stylesheet" href="{% static 'tasks/style.css' %}">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">&#10003;</div>
    <h1 class="login-title">Todo Perso</h1>

    <form method="post" action="{% url 'login' %}{% if request.GET.next %}?next={{ request.GET.next }}{% endif %}">
      {% csrf_token %}
      <div class="form-group">
        <label class="form-label">Token d'accès</label>
        <input type="password" name="token" class="form-input form-input-title"
               placeholder="Entrez votre token" autofocus autocomplete="current-password">
      </div>
      {% if error %}
      <p class="login-error">{{ error }}</p>
      {% endif %}
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;margin-top:8px">
        Accéder
      </button>
    </form>
  </div>
</div>
</body>
</html>
